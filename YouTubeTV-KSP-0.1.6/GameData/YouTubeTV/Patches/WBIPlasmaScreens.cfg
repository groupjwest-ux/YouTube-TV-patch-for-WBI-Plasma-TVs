// Adds video playback to every external Wild Blue Industries plasma-screen part.
// The original WBIPlasmaTV module remains available for still-image selection.
@PART[*]:HAS[@MODULE[WBIPlasmaTV],!MODULE[WBIYouTubeTV]]:FOR[YouTubeTV]
{
    MODULE
    {
        name = WBIYouTubeTV
        screenTransform = Screen
        screenWidth = 1280
        screenHeight = 720
        audioMinDistance = 1
        audioMaxDistance = 25
        resolverTimeoutSeconds = 45
    }
}
